baseURL                          = "http://youngkidhong.github.io"   # Your domain name. Must end with "/"
theme = "hugo-theme-introduction"
DefaultContentLanguage           = "en"                    # Default language for multilingual sites

[params]
    themeStyle                   = "light"                 # Choose "light" or "dark"
    favicon                      = "/img/favicon.ico"          # Path to favicon file
    showRSSButton                = false                   # Show rss button in navigation
    fadeIn                       = true                    # Turn on/off the fade-in effect
    fadeInIndex                  = false                   # Turn on/off the fade-in effect on the index page even if fade-in was otherwise turned off
    dateFormat                   = "Jan 2, 2006"
    email                        = ""   # E-mail address for contact section
    # customCSS                  = ["foo.css"]             # Include custom css files placed under assets/

    # Configure the home page
    [params.home]
        introHeight              = "fullheight"            # Input either "medium" or "large" or "fullheight"
        showLatest               = true                    # Show latest blog post summary
        showAllPosts             = false                   # Set true to list all posts on home page, or set false to link to separate blog list page
        numberOfProjectsToShow   = 2                       # Maximum number of projects to show on home page. Unset or comment out to show all projects
        localTime                = false                   # Show your current local time in contact section
        timeZone                 = "America/Los_Angeles"   # Your timezone as in the TZ* column of this list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
        timeFormat               = "h:mm A"                # https://momentjs.com/docs/#/displaying/format/
    [params.projects]
        useTwoColumns            = false                   # Use a layout with two columns instead of three

    # Share buttons on blog post pages
    [params.share]
        twitter                  = false
        facebook                 = false
        googlePlus               = false
        pinterest                = false

    # Social icons appear in introduction and contact section. Add as many more as you like.
    # Icon pack "fab" includes social network icons, see: https://fontawesome.com/icons?d=gallery&s=brands&m=free
    # Icon pack "fas" includes solid style icons, see: https://fontawesome.com/icons?d=gallery&s=solid&m=free
    [[params.social]]
        url   = "https://twitter.com/youngkidhong"
        icon  = "twitter" # icon name without the 'fa-'
        icon_pack = "fab"
    [[params.social]]
        url   = "https://scholar.google.com/citations?user=5YPTlEMAAAAJ&hl=en/"
        icon  = "google" # icon name without the 'fa-'
        icon_pack = "fab"
    [[params.social]]
        url   = "https://github.com/youngkidhong"
        icon  = "github" # icon name without the 'fa-'
        icon_pack = "fab"
    [[params.social]]
        url = "mailto:youngki.hong@psych.ucsb.edu"  # For a direct email link, use "mailto:test@example.org".
        icon = "paper-plane" # icon name without the 'fa-'
        icon_pack = "fas"
    [[params.social]]
        url = "https://ucsb.box.com/s/lh9swalrqouxlvu880s0rev1g1edv1vh"  # For a direct email link, use "mailto:test@example.org".
        icon = "file-alt" # icon name without the 'fa-'
        icon_pack = "fas"


# If you don't want to use the default menu, you can define one by yourself
 [[menu.main]]
    name    = "Home"
    url     = "/#top"
    weight  = 5
 [[menu.main]]
    name    = "About"
    url     = "/#about"
    weight  = 6
 [[menu.main]]
    name    = "News"
    url     = "/#news"
    weight  = 7
 [[menu.main]]
    name    = "Publications"
    url     = "/#publication"
    weight  = 8
 [[menu.main]]
    name    = "Presentations"
    url     = "/#presentation"
    weight  = 9
 [[menu.main]]
    name    = "Contact"
    url     = "/#contact"
    weight  = 10
# We only use tag as a taxonomies
# You can add more by yourself
[taxonomies]
  tag = "tags"

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.goldmark]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    # For styles, see https://xyproto.github.io/splash/docs/longer/all.html
    style = "friendly"
    tabWidth = 4

[languages]
    [languages.en]
        languageName     = "English"
        languageCode     = "en-us"
        contentDir       = "content/en"
        weight           = 0
        title            = "Youngki Hong's website"
        [languages.en.params]
            description  = "Youngki Hong's personal website"   # Max 160 characters show in search results
            footerText   = "Last updated: November 20, 2020"                      # Text to override default footer text (markdown allowed)
